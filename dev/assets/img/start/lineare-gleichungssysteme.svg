<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <!-- Three lines meeting at one point (LGS solution) -->
  <!-- Line 1 -->
  <line x1="20" y1="40" x2="220" y2="110" stroke="#7c6aff" stroke-width="2" opacity=".6"/>
  <!-- Line 2 -->
  <line x1="30" y1="140" x2="210" y2="20" stroke="#3dd6c8" stroke-width="2" opacity=".6"/>
  <!-- Line 3 -->
  <line x1="20" y1="90" x2="220" y2="70" stroke="#f5a623" stroke-width="2" opacity=".5"/>
  <!-- Solution point -->
  <circle cx="120" cy="78" r="6" fill="none" stroke="#7c6aff" stroke-width="2" opacity=".8"/>
  <circle cx="120" cy="78" r="2.5" fill="#7c6aff" opacity=".8"/>
  <!-- Equation hints -->
  <text x="15" y="16" font-family="system-ui" font-size="10" fill="#7c6aff" opacity=".4">I</text>
  <text x="15" y="30" font-family="system-ui" font-size="10" fill="#3dd6c8" opacity=".4">II</text>
  <text x="15" y="44" font-family="system-ui" font-size="10" fill="#f5a623" opacity=".4">III</text>
</svg>
