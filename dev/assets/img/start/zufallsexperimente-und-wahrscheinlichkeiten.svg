<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <!-- Outcome space rectangle -->
  <rect x="50" y="20" width="140" height="120" rx="8" stroke="#7c6aff" stroke-width="1.5" fill="#7c6aff" fill-opacity=".04"/>
  <!-- Omega label -->
  <text x="60" y="36" font-family="system-ui" font-size="12" font-weight="600" fill="#7c6aff" opacity=".5">Ω</text>
  <!-- Scattered outcome dots -->
  <circle cx="90" cy="55" r="6" fill="#7c6aff" opacity=".3"/>
  <circle cx="130" cy="45" r="6" fill="#7c6aff" opacity=".3"/>
  <circle cx="160" cy="65" r="6" fill="#7c6aff" opacity=".3"/>
  <circle cx="80" cy="90" r="6" fill="#7c6aff" opacity=".3"/>
  <circle cx="115" cy="80" r="6" fill="#7c6aff" opacity=".3"/>
  <circle cx="155" cy="100" r="6" fill="#7c6aff" opacity=".3"/>
  <circle cx="100" cy="115" r="6" fill="#7c6aff" opacity=".3"/>
  <circle cx="140" cy="120" r="6" fill="#7c6aff" opacity=".3"/>
  <!-- Event subset -->
  <ellipse cx="128" cy="72" rx="45" ry="32" stroke="#3dd6c8" stroke-width="1.5" stroke-dasharray="5 3" fill="#3dd6c8" fill-opacity=".08"/>
  <!-- Highlighted elements in event -->
  <circle cx="130" cy="45" r="6" fill="#3dd6c8" opacity=".6"/>
  <circle cx="115" cy="80" r="6" fill="#3dd6c8" opacity=".6"/>
  <circle cx="160" cy="65" r="6" fill="#3dd6c8" opacity=".6"/>
  <!-- Event label -->
  <text x="145" y="60" font-family="system-ui" font-size="11" font-weight="600" fill="#3dd6c8" opacity=".6">E</text>
</svg>
