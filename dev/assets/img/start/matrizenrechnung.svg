  <text x="80" y="60" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#7c6aff" opacity=".7">a</text>
  <text x="120" y="60" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#7c6aff" opacity=".5">b</text>
  <text x="160" y="60" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#7c6aff" opacity=".3">c</text>
  <text x="80" y="88" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#3dd6c8" opacity=".5">d</text>
  <text x="120" y="88" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#3dd6c8" opacity=".7">e</text>
  <text x="160" y="88" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#3dd6c8" opacity=".5">f</text>
  <text x="80" y="118" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#7c6aff" opacity=".3">g</text>
  <text x="120" y="118" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#7c6aff" opacity=".5">h</text>
  <text x="160" y="118" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#7c6aff" opacity=".7">i</text>
  <!-- Row/col grid lines (subtle) -->
  <line x1="60" y1="68" x2="180" y2="68" stroke="#7c6aff" stroke-width=".5" opacity=".15"/>
  <line x1="60" y1="96" x2="180" y2="96" stroke="#7c6aff" stroke-width=".5" opacity=".15"/>
  <line x1="100" y1="38" x2="100" y2="128" stroke="#7c6aff" stroke-width=".5" opacity=".15"/>
