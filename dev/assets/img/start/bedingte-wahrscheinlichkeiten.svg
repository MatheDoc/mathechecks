<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <!-- Venn diagram - two overlapping circles -->
  <circle cx="95" cy="80" r="50" stroke="#7c6aff" stroke-width="2" fill="#7c6aff" fill-opacity=".08"/>
  <circle cx="145" cy="80" r="50" stroke="#3dd6c8" stroke-width="2" fill="#3dd6c8" fill-opacity=".08"/>
  <!-- Intersection highlight -->
  <clipPath id="c1"><circle cx="95" cy="80" r="50"/></clipPath>
  <circle cx="145" cy="80" r="50" fill="#f5a623" fill-opacity=".15" clip-path="url(#c1)"/>
  <!-- Labels -->
  <text x="75" y="84" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#7c6aff" opacity=".7">A</text>
  <text x="165" y="84" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#3dd6c8" opacity=".7">B</text>
  <text x="120" y="84" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#f5a623" opacity=".7">A∩B</text>
  <!-- P(A|B) annotation -->
  <text x="120" y="148" text-anchor="middle" font-family="system-ui" font-size="10" fill="#7c6aff" opacity=".5">P(A|B)</text>
</svg>
