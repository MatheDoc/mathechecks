<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <!-- Tree diagram - 2 levels -->
  <!-- Root -->
  <circle cx="40" cy="80" r="5" fill="#7c6aff" opacity=".7"/>
  <!-- Level 1 -->
  <line x1="45" y1="77" x2="110" y2="40" stroke="#7c6aff" stroke-width="1.5" opacity=".5"/>
  <line x1="45" y1="83" x2="110" y2="120" stroke="#7c6aff" stroke-width="1.5" opacity=".5"/>
  <circle cx="115" cy="38" r="5" fill="#7c6aff" opacity=".7"/>
  <circle cx="115" cy="122" r="5" fill="#7c6aff" opacity=".7"/>
  <!-- Level 2 from top -->
  <line x1="120" y1="35" x2="185" y2="18" stroke="#3dd6c8" stroke-width="1.5" opacity=".4"/>
  <line x1="120" y1="41" x2="185" y2="58" stroke="#3dd6c8" stroke-width="1.5" opacity=".4"/>
  <circle cx="190" cy="16" r="4" fill="#3dd6c8" opacity=".6"/>
  <circle cx="190" cy="60" r="4" fill="#3dd6c8" opacity=".6"/>
  <!-- Level 2 from bottom -->
  <line x1="120" y1="119" x2="185" y2="102" stroke="#3dd6c8" stroke-width="1.5" opacity=".4"/>
  <line x1="120" y1="125" x2="185" y2="142" stroke="#3dd6c8" stroke-width="1.5" opacity=".4"/>
  <circle cx="190" cy="100" r="4" fill="#3dd6c8" opacity=".6"/>
  <circle cx="190" cy="144" r="4" fill="#3dd6c8" opacity=".6"/>
  <!-- Probability labels -->
  <text x="72" y="52" font-family="system-ui" font-size="9" fill="#7c6aff" opacity=".6">p</text>
  <text x="72" y="112" font-family="system-ui" font-size="9" fill="#7c6aff" opacity=".6">1−p</text>
  <text x="148" y="22" font-family="system-ui" font-size="8" fill="#3dd6c8" opacity=".5">q</text>
  <text x="148" y="55" font-family="system-ui" font-size="8" fill="#3dd6c8" opacity=".5">1−q</text>
</svg>
