worum_geht_es: >
  Eine bedingte Wahrscheinlichkeit beschreibt die Wahrscheinlichkeit eines Ereignisses,
  unter der Voraussetzung, dass ein anderes Ereignis bereits eingetreten ist. In
  Baumdiagrammen treten bedingte Wahrscheinlichkeiten ab der 2. Stufe auf.

darauf_kommt_es_an: >
  Um festzustellen, ob eine bedingte Wahrscheinlichkeit vorliegt, ist es wichtig,
  die textuelle Beschreibung eines Ereignisses genau zu lesen und zu prüfen, ob eine
  Voraussetzung gegeben ist. Besonders wichtig ist es, sauber zwischen bedingten
  Wahrscheinlichkeiten und Schnittwahrscheinlichkeiten zu unterscheiden.

