worum_geht_es: >
  Die Differentialrechnung untersucht das lokale Verhalten ganzrationaler
  Funktionen. Mithilfe von Ableitungen bestimmen wir Steigungen, Extremstellen
  und Wendepunkte und führen vollständige Kurvendiskussionen durch.

darauf_kommt_es_an: >
  Die Ableitungsregeln (Potenzregel, Summen- und Faktorregel) müssen sicher
  angewendet werden können. Zentral ist die Interpretation der Ableitung als
  Steigung der Tangente und die systematische Untersuchung von Funktionen auf
  Nullstellen, Extremstellen und Wendepunkte.
