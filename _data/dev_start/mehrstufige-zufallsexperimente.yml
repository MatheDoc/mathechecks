worum_geht_es: >
  Mehrstufige Zufallsexperimente sind Zufallsexperimente, die aus mehreren einfachen
  Einzelexperimenten bestehen. Wir lernen, wie wir solche Experimente mithilfe von
  Baumdiagrammen darstellen und auswerten können.

darauf_kommt_es_an: >
  Baumdiagramme müssen mit Hilfe der Pfadregeln sicher vervollständigt werden können.
  Besonders das zentrale Beispiel eines Baumdiagramms mit zwei Ereignissen ist von
  großer Bedeutung.

