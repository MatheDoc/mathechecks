worum_geht_es: >
  Beim Hypothesentest wird mit Hilfe von Stichproben überprüft, ob eine vermutete
  Hypothese über eine Grundgesamtheit zutrifft. Ziel ist es, ein systematisches
  Verfahren kennenzulernen, mit dem wir entscheiden können, ob eine Hypothese
  beibehalten oder verworfen werden sollte.

darauf_kommt_es_an: >
  Beim Hypothesentest ist es wichtig, die Situationsbeschreibung sorgfältig zu lesen
  und genau zu verstehen, was überprüft werden soll. Außerdem muss der Umgang mit der
  sogenannten $k$-Bestimmung sicher beherrscht werden: Bei gegebenem Stichprobenumfang
  $n$ und angenommener Trefferwahrscheinlichkeit $p$ müssen wir das minimale oder
  maximale $k$ bestimmen können, so dass eine vorgegebene Wahrscheinlichkeit der Art
  $P(X\leq k)$ oder $P(X\geq k)$ unterschritten wird.

