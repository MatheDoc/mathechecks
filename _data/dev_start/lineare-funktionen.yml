worum_geht_es: >
  Lineare Funktionen beschreiben gleichmäßige Zusammenhänge der Form
  $f(x)=mx+b$. Wir untersuchen Steigung, $y$-Achsenabschnitt, Nullstellen
  sowie Schnittpunkte zweier Geraden und lernen, Funktionsgleichungen aus
  gegebenen Informationen aufzustellen.

darauf_kommt_es_an: >
  Die Bedeutung der Parameter $m$ (Steigung) und $b$ ($y$-Achsenabschnitt)
  muss sicher beherrscht werden. Funktionsgleichungen müssen aus Wertetabellen,
  Graphen oder Textbeschreibungen aufgestellt werden können. Schnittpunkte
  zweier Geraden werden durch Gleichsetzen berechnet.
