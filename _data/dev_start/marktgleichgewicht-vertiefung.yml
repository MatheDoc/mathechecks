worum_geht_es: >
  Wir wiederholen die Grundlagen zum Marktgleichgewicht: den Zustand, in dem Angebot
  und Nachfrage übereinstimmen. Dabei untersuchen wir beliebige Angebots- und
  Nachfragefunktionen. Außerdem diskutieren wir die Konsumenten- und Produzentenrente.

darauf_kommt_es_an: >
  Die Kennzahlen zum Marktgleichgewicht wie die Gleichgewichtsmenge und der
  Gleichgewichtspreis müssen bekannt sein. Sowohl die rechnerische als auch die
  graphische Interpretation dieser Größen ist zentral. Die Berechnung und graphische
  Bestimmung der Konsumenten- und Produzentenrente muss sicher beherrscht werden.

