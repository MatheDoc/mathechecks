worum_geht_es: >
  Mehrstufige Produktionsprozesse bezeichnen aufeinanderfolgende Herstellungsschritte,
  in denen aus Rohstoffen zunächst Zwischenprodukte entstehen. Diese Zwischenprodukte
  werden in weiteren Stufen weiterverarbeitet, bis schließlich das Endprodukt entsteht.
  Im Unterschied zu einstufigen Prozessen, bei denen Rohstoffe unmittelbar zu
  Endprodukten verarbeitet werden, umfasst die mehrstufige Produktion mehrere
  nacheinander ablaufende Arbeitsgänge. Zur strukturierten Analyse werden häufig
  Produktionsmatrizen verwendet, mit deren Hilfe sich der Bedarf an Rohstoffen und
  Zwischenprodukten berechnen lässt.

darauf_kommt_es_an: >
  Die ökonomischen Formeln aus dem eindimensionalen Fall müssen auf Situationen mit
  mehreren Gütern und mehreren Produktionsstufen übertragen werden. Wichtig ist der
  routinierte Umgang mit dem Taschenrechner bei der Matrizenrechnung.

