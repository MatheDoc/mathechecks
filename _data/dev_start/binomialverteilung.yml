worum_geht_es: >
  Binomialverteilten Zufallsgrößen liegen mehrstufige Zufallsexperimente zugrunde,
  bei denen es auf jeder Stufe nur zwei mögliche Ergebnisse mit jeweils festen
  Wahrscheinlichkeiten gibt. Aufgrund dieser klaren Struktur lassen sich viele
  Aufgaben systematisch lösen.

darauf_kommt_es_an: >
  Wichtig ist es, die Aufgabenstellung sorgfältig zu lesen (zum Beispiel Begriffe
  wie „mindestens" oder „höchstens" genau zu beachten). Zudem wird häufig mit dem
  Taschenrechner oder dem Tafelwerk gearbeitet. Diese Hilfsmittel müssen richtig
  angewendet werden können.

