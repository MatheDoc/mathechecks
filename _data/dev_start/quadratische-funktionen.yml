worum_geht_es: >
  Quadratische Funktionen haben die Form $f(x)=ax^2+bx+c$ und erzeugen
  Parabeln als Graphen. Wir lernen drei Darstellungsformen kennen
  (Normalform, Scheitelpunktform, faktorisierte Form), berechnen
  Nullstellen und Schnittpunkte, wandeln zwischen den Formen um und
  modellieren Sachsituationen wie Brückenbögen oder Wurfparabeln.

darauf_kommt_es_an: >
  Die sichere Umwandlung zwischen Normal-, Scheitelpunkt- und faktorisierter
  Form ist die Schlüsselkompetenz. Die $p$-$q$-Formel, das Ablesen von
  Nullstellen und Scheitel sowie die quadratische Ergänzung müssen routiniert
  beherrscht werden. Im Sachkontext kommt es darauf an, ein passendes
  Koordinatensystem zu wählen und die Ergebnisse zu interpretieren.

