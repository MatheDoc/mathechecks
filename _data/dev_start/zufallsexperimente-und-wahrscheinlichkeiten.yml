worum_geht_es: >
  In der Stochastik geht es um die mathematische Untersuchung von Zufall und
  Unsicherheit. Wir führen die grundlegenden Begriffe rund um Mengen,
  Zufallsexperimente und Wahrscheinlichkeiten ein.

darauf_kommt_es_an: >
  Bevor wir Wahrscheinlichkeiten berechnen, müssen wir genau definieren, was wir
  untersuchen wollen – also, welche Ereignisse wir betrachten. Dies erfordert eine
  klare und sorgfältige Beschreibung der Ergebnismenge und der Ereignisse, deren
  Wahrscheinlichkeiten wir bestimmen möchten. Wichtig ist das Verständnis der
  Verknüpfungen „und" und „oder". Diese Begriffe werden in der Stochastik oft anders
  verwendet als im alltäglichen Sprachgebrauch.

