worum_geht_es: >
  Eine Zufallsgröße ordnet den Ergebnissen eines Zufallsexperiments reelle Zahlen zu.
  So kann man Zufallsexperimente mathematisch auswerten – zum Beispiel Erwartungs- und
  Schwankungswerte bestimmen.

darauf_kommt_es_an: >
  Die Berechnung des Erwartungswerts und der Standardabweichung muss beherrscht werden.
  Wichtig ist die Interpretation im Sachzusammenhang: Der Erwartungswert gibt den zu
  erwartenden Mittelwert an, während die Standardabweichung die Streuung der Werte um
  diesen Mittelwert misst.

