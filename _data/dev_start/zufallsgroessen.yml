worum_geht_es: >
  Eine Zufallsgröße ordnet den Ergebnissen eines Zufallsexperiments reelle Zahlen zu.
  So kann man Zufallsexperimente mathematisch auswerten – zum Beispiel Erwartungs- und
  Schwankungswerte bestimmen.

