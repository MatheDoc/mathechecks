worum_geht_es: >
  Wir behandeln die Grundlagen zum Marktgleichgewicht: den Zustand, in dem Angebot
  und Nachfrage übereinstimmen. Dazu untersuchen wir die lineare Angebots- und
  Nachfragefunktion.

darauf_kommt_es_an: >
  Die Kennzahlen zum Marktgleichgewicht wie die Gleichgewichtsmenge und der
  Gleichgewichtspreis müssen bekannt sein. Sowohl die rechnerische als auch die
  graphische Interpretation dieser Größen ist zentral.

