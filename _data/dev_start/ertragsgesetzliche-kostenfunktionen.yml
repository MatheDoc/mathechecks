worum_geht_es: >
  In diesem Abschnitt werden die Funktionen der Gesamtkosten, Stückkosten und
  variablen Stückkosten untersucht. Mit Hilfe der Differentialrechnung werden wichtige
  ökonomische Kennzahlen berechnet und analysiert. Der Begriff der
  Ertragsgesetzlichkeit wird diskutiert.

darauf_kommt_es_an: >
  Wichtige Kostenkennzahlen wie das Betriebsminimum oder die kurzfristige
  Preisuntergrenze müssen bekannt sein. Sowohl die rechnerische als auch die graphische
  Interpretation dieser Größen ist zentral. Ertragsgesetzliche Kostenfunktionen müssen
  aus gegebenen Informationen aufgestellt werden, dabei müssen lineare
  Gleichungssysteme gelöst werden.

