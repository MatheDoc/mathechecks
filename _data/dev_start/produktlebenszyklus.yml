worum_geht_es: >
  In diesem Abschnitt wird der Produktlebenszyklus als ökonomische Anwendung der
  Analysis untersucht. Umsatzfunktionen der Form $u(t)=p(t)\cdot e^{-ct}$ werden
  graphisch und rechnerisch analysiert. Typische Kennzahlen wie der maximale Umsatz,
  der Marktaustritt oder der langfristige Umsatz werden bestimmt. Im zweiten Teil
  kommen Integrale hinzu (Gesamtumsatz, Durchschnittsumsatz). Schließlich wird der
  EKG-Zyklus (Erlös – Kosten – Gewinn) betrachtet.

darauf_kommt_es_an: >
  Die Kennzahlen des Produktlebenszyklus müssen sowohl am Graphen abgelesen als auch
  rechnerisch bestimmt werden können. Besonders wichtig ist die Interpretation der
  Ableitung $u'(t)$ (stärkster Anstieg/Rückgang) und die sichere Anwendung von
  Integralen (Gesamtumsatz, durchschnittlicher Umsatz). Im EKG-Zyklus muss die
  Gewinnfunktion $G(t)=E(t)-K(t)$ aufgestellt und der Zeitraum der Kostendeckung
  bestimmt werden.

