worum_geht_es: >
  Matrizen sind rechteckige Zahlenschemata, mit denen sich viele mathematische
  und ökonomische Zusammenhänge kompakt darstellen lassen. Wir lernen die
  Grundrechenarten für Matrizen kennen und behandeln Inverse, Determinanten
  sowie Matrizengleichungen.

darauf_kommt_es_an: >
  Die Matrizenmultiplikation muss sicher beherrscht werden – insbesondere die
  Bedingung, wann zwei Matrizen multipliziert werden dürfen. Darüber hinaus ist
  die Berechnung von Inversen und Determinanten zentral, ebenso der routinierte
  Umgang mit dem Taschenrechner bei größeren Matrizen.
