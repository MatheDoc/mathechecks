worum_geht_es: >
  Ein lineares Gleichungssystem besteht aus mehreren linearen Gleichungen mit mehreren
  Unbekannten. Wir untersuchen, welche Arten von Lösungen lineare Gleichungssysteme
  besitzen können, und lernen Verfahren kennen, mit denen sich diese Lösungen bestimmen
  lassen.

vorkenntnisse_extern:
  - Lineare Gleichungen mit einer Unbekannten
