worum_geht_es: >
  In diesem Abschnitt werden zentrale ökonomische Funktionen wie Preis-, Erlös-,
  Kosten- und Gewinnfunktionen untersucht. Mit Hilfe der Differentialrechnung werden
  wichtige ökonomische Kennzahlen berechnet und analysiert.

darauf_kommt_es_an: >
  Wichtige ökonomische Kennzahlen wie Grenzkosten, Gewinnmaximum oder Break-even-Point
  müssen bekannt sein. Sowohl die rechnerische als auch die graphische Interpretation
  dieser Größen ist zentral.

