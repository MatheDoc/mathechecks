# ──────────────────────────────────────────────────────────
# Modultypen – Farbdefinitionen
# ──────────────────────────────────────────────────────────
# Jedes Modul hat genau EINE Kennfarbe.
# Abgeleitete Werte (border, icon-bg) werden im
# Template (_includes/dev/topbar.html) aus system_rgb
# berechnet.
#
# Felder:
#   system_color  – Hex-Primaerfarbe (Dark-Mode-Variante)
#   system_rgb    – RGB-Tripel fuer rgba()-Ableitungen
#   system_soft   – Blasse Variante fuer Hintergruende
#   color_name    – Kurzbeschreibung des Farbtons (Deutsch)
# ──────────────────────────────────────────────────────────

- key: start
