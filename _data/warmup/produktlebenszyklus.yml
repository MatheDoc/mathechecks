karten:
  - typ: wusstest-du
    text: "Das neue iPhone ist ein Hype – aber würdest du das alte Modell sofort aus dem Sortiment nehmen, nur weil der Nachfolger da ist?"
    detail: "Genau solche Entscheidungen hängen daran, wie sich Verkäufe über die Zeit entwickeln. Der Produktlebenszyklus macht aus Bauchgefühl eine begründbare Entscheidung."
  - typ: schaetzfrage
    frage: "Wann verkaufen sich viele Produkte typischerweise am stärksten?"
    optionen:
      - "Schon direkt in der Einführungsphase"
      - "Erst in der Reifephase"
      - "Erst ganz am Ende vor dem Rückgang"
    korrekt: 1
    erklaerung: "Typischerweise erreicht ein Produkt seine höchsten Verkaufszahlen erst in der Reifephase. Davor wächst der Absatz, danach flacht er ab oder sinkt wieder."
  - typ: alltag
    text: "Ob Smartphone, Streaming-Abo oder Sneaker-Drop: Wer zu früh oder zu spät reagiert, verliert Geld."
    detail: "In diesem Lernbereich geht es darum, typische Phasen in Daten zu erkennen und mathematisch zu beschreiben. So lässt sich begründen, wann Wachstum kippt und wann ein Produkt seinen Höhepunkt überschritten hat."
abschluss: "Vom Hype bis zum Nachlassen des Interesses: Du lernst, Produktverläufe nicht nur zu beobachten, sondern mathematisch zu deuten."
