karten:
  - typ: wusstest-du
    text: "Ein Test ist zu $99\\,\\%$ genau und dein Ergebnis ist positiv. Würdest du sofort davon ausgehen, dass du wirklich krank bist?"
    detail: "Genau hier irren sich viele. Ein positives Ergebnis klingt eindeutig, sagt aber ohne Hintergrundwissen oft viel weniger aus als man denkt."
  - typ: schaetzfrage
    frage: "Ein Krankheitstest ist zu $99\\,\\%$ zuverlässig, die Krankheit betrifft $1\\,\\%$ aller Menschen. Wie viel Prozent der positiv Getesteten sind wirklich krank?"
    optionen:
      - "Über $90\\,\\%$"
      - "Etwa $50\\,\\%$"
      - "Unter $10\\,\\%$"
    korrekt: 1
    erklaerung: "Überraschend: Nur etwa die Hälfte. Selbst ein sehr guter Test erzeugt bei seltenen Krankheiten viele falsch-positive Ergebnisse, weil es so viel mehr Gesunde als Kranke gibt."
  - typ: alltag
    text: "Bei Tests, Warnsystemen und Diagnosen geht es nie nur um die Frage: Wie gut ist das Verfahren? Sondern auch: Wie häufig ist der Fall überhaupt?"
    detail: "Genau das untersucht die bedingte Wahrscheinlichkeit. Sie hilft dir, Ergebnisse nicht vorschnell zu deuten, sondern fair und realistisch einzuordnen."
abschluss: "Ein positives Ergebnis ist nicht automatisch Gewissheit. Du lernst, wie man solche Situationen mathematisch klarer beurteilt."
