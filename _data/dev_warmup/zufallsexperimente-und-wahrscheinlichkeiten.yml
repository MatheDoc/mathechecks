karten:
  - typ: wusstest-du
    text: "Bei $23$ Personen in einem Raum liegt die Wahrscheinlichkeit bei über $50\\,\\%$, dass zwei am selben Tag Geburtstag haben."
    detail: "Das 'Geburtstagsparadoxon' überrascht fast alle – und zeigt, wie unintuitiv Wahrscheinlichkeiten sein können."
  - typ: schaetzfrage
    frage: "Du wirfst zwei Würfel. Wie wahrscheinlich ist eine Augensumme von $7$?"
    optionen:
      - "Etwa $8\\,\\%$"
      - "Etwa $17\\,\\%$"
      - "Etwa $25\\,\\%$"
    korrekt: 1
    erklaerung: "$6$ von $36$ möglichen Kombinationen ergeben die $7$ – das sind etwa $17\\,\\%$. Mehr als die meisten denken!"
  - typ: vorwissen
    frage: "Bei einem fairen Würfel ist die Wahrscheinlichkeit für eine $6$ …"
    optionen:
      - "$\\frac{1}{6}$"
      - "$\\frac{1}{3}$"
      - "$\\frac{1}{2}$"
    korrekt: 0
    feedback_richtig: "Genau! Das ist die Grundlage für alles, was kommt."
    feedback_falsch: "Kein Problem – mit Laplace-Wahrscheinlichkeiten starten wir hier ganz von vorn."
  - typ: alltag
    text: "Wettervorhersagen wie 'Regenwahrscheinlichkeit $70\\,\\%$' basieren auf stochastischen Modellen."
    detail: "Meteorologen nutzen Wahrscheinlichkeitsrechnung, um aus Millionen Datenpunkten Vorhersagen zu treffen."
abschluss: "Der Zufall hat Regeln – und du lernst sie hier kennen."
