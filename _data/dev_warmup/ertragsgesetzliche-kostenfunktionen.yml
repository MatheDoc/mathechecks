karten:
  - typ: wusstest-du
    text: "Das Ertragsgesetz stammt ursprünglich aus der Landwirtschaft: Mehr Dünger bringt irgendwann immer weniger Ertrag."
    detail: "Dieses Prinzip – erst steigende, dann sinkende Erträge – wird mit S-förmigen Kostenfunktionen modelliert."
  - typ: schaetzfrage
    frage: "Eine Fabrik verdoppelt die Mitarbeiterzahl. Um wie viel steigt die Produktion?"
    optionen:
      - "Verdoppelt sich auch"
      - "Bleibt gleich"
      - "Steigt, aber weniger als doppelt"
    korrekt: 2
    erklaerung: "Typisch für das Ertragsgesetz: Mehr Input bringt ab einem Punkt immer weniger zusätzlichen Output."
  - typ: vorwissen
    frage: "Eine ertragsgesetzliche Kostenfunktion hat typischerweise …"
    optionen:
      - "einen linearen Verlauf"
      - "einen S-förmigen Verlauf"
      - "einen konstanten Verlauf"
    korrekt: 1
    feedback_richtig: "Genau! Der S-förmige Verlauf ist das Erkennungsmerkmal."
    feedback_falsch: "Kein Problem – den typischen Kurvenverlauf schauen wir uns gemeinsam an."
  - typ: alltag
    text: "In einer Bäckerei wird ab $5$ Uhr gebacken. Die ersten $100$ Brötchen gehen schnell – aber die nächsten $100$ dauern länger."
    detail: "Die steigenden Grenzkosten bei hoher Auslastung – genau das beschreibt die ertragsgesetzliche Kostenfunktion."
abschluss: "Kosten clever modellieren – genau das lernst du hier."
