karten:
  - typ: wusstest-du
    text: "Wenn ein neues Smartphone erscheint, bestimmen Angebot und Nachfrage den Preis – nicht allein der Hersteller."
    detail: "Der Gleichgewichtspreis entsteht dort, wo Angebots- und Nachfragefunktion sich schneiden."
  - typ: schaetzfrage
    frage: "Konzerttickets sind ausverkauft und werden für das Doppelte weiterverkauft. Was ist passiert?"
    optionen:
      - "Angebot ist größer als Nachfrage"
      - "Nachfrage ist größer als Angebot"
      - "Der Markt ist im Gleichgewicht"
    korrekt: 1
    erklaerung: "Bei Überschussnachfrage steigen die Preise – der Markt ist nicht im Gleichgewicht."
  - typ: vorwissen
    frage: "Im Marktgleichgewicht gilt …"
    optionen:
      - "Der Preis ist immer niedrig"
      - "Angebot ist größer als Nachfrage"
      - "Angebot gleich Nachfrage"
    korrekt: 2
    feedback_richtig: "Genau! Das Gleichgewicht ist der Kern der Markttheorie."
    feedback_falsch: "Das ist die zentrale Idee – und wir erarbeiten sie hier Schritt für Schritt."
  - typ: alltag
    text: "Warum kosten Erdbeeren im Winter mehr als im Sommer?"
    detail: "Weniger Angebot bei gleichbleibender Nachfrage ergibt einen höheren Gleichgewichtspreis. Marktmechanismen in Aktion."
abschluss: "Angebot und Nachfrage – ein faszinierendes Zusammenspiel. Bereit!"
