karten:
  - typ: wusstest-du
    text: "Unternehmen nutzen ganzrationale Funktionen, um Kosten, Erlöse und Gewinne mathematisch zu modellieren."
    detail: "Eine typische Kostenfunktion wie $K(x)=0{,}5x^3-3x^2+10x+50$ beschreibt, wie die Kosten mit der Stückzahl steigen."
  - typ: schaetzfrage
    frage: "Ein Unternehmen produziert T-Shirts. Ab welcher Stückzahl wird typischerweise Gewinn erzielt?"
    optionen:
      - "Ab dem $1$. Stück"
      - "Nie – Kosten steigen immer schneller"
      - "Erst ab einer bestimmten Menge"
    korrekt: 2
    erklaerung: "Den Punkt, ab dem Erlöse die Kosten übersteigen, nennt man Break-even-Point – eine zentrale Anwendung."
  - typ: vorwissen
    frage: "Der Gewinn eines Unternehmens berechnet sich als …"
    optionen:
      - "Erlös minus Kosten"
      - "Kosten minus Erlös"
      - "Erlös mal Kosten"
    korrekt: 0
    feedback_richtig: "Richtig! $G(x)=E(x)-K(x)$ ist die Grundformel der Gewinnrechnung."
    feedback_falsch: "Kein Stress – diese Formel wird dir hier ganz vertraut werden."
  - typ: alltag
    text: "Ein Startup berechnet: Wie viele Abos brauchen wir, um die Entwicklungskosten reinzuholen?"
    detail: "Genau das ist die Frage nach dem Break-even-Point – und ganzrationale Funktionen liefern die Antwort."
abschluss: "Mathe trifft Wirtschaft – das wird spannend. Los geht's!"
