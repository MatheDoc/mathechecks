worum_geht_es: >
  Binomialverteilten Zufallsgrößen liegen mehrstufige Zufallsexperimente zugrunde,
  bei denen es auf jeder Stufe nur zwei mögliche Ergebnisse mit jeweils festen
  Wahrscheinlichkeiten gibt. Aufgrund dieser klaren Struktur lassen sich viele
  Aufgaben systematisch lösen.

