worum_geht_es: >
  Beim Hypothesentest wird mit Hilfe von Stichproben überprüft, ob eine vermutete
  Hypothese über eine Grundgesamtheit zutrifft. Ziel ist es, ein systematisches
  Verfahren kennenzulernen, mit dem wir entscheiden können, ob eine Hypothese
  beibehalten oder verworfen werden sollte.

