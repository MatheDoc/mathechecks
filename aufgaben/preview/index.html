<!doctype html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aufgaben-Preview</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script defer src="./preview.js"></script>
</head>

<body>
    <main class="page">
        <h1>Aufgaben-Preview</h1>
        <p class="hint">Getrennte Vorschau für generierte JSON-Dateien aus dem Aufgabenprojekt.</p>

        <section class="toolbar">
            <div class="field">
                <label for="gebietSelect">Gebiet</label>
                <select id="gebietSelect"></select>
            </div>
            <div class="field">
                <label for="lernbereichSelect">Lernbereich</label>
                <select id="lernbereichSelect"></select>
            </div>
            <div class="field">
                <label for="sammlungSelect">Sammlung</label>
                <select id="sammlungSelect"></select>
            </div>
            <button id="loadBtn" type="button">Laden</button>
            <label class="inline-option">
                <input id="showSolutions" type="checkbox" />
                Lösungen anzeigen
            </label>
        </section>

        <section id="status" class="status"></section>
        <section id="list" class="list"></section>
    </main>
</body>

</html>
