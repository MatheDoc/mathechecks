<!doctype html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aufgaben-Preview</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script defer src="./preview.js"></script>
</head>

<body>
    <main class="page">
        <h1>Aufgaben-Preview</h1>
        <p class="hint">Getrennte Vorschau für generierte JSON-Dateien aus dem Aufgabenprojekt.</p>

        <section class="toolbar">
            <label for="jsonPath">JSON-Pfad</label>
            <select id="jsonPath">
                <option value="../exports/json/analysis/analysis-diverses/regression.json" selected>analysis /
                    analysis-diverses / regression.json</option>
                <optgroup label="analysis / ertragsgesetzliche-kostenfunktionen">
                    <option value="../exports/json/analysis/ertragsgesetzliche-kostenfunktionen/kennzahlen-ansatz.json">
                        kennzahlen-ansatz.json</option>
                    <option
                        value="../exports/json/analysis/ertragsgesetzliche-kostenfunktionen/kennzahlen-definition.json">
                        kennzahlen-definition.json</option>
                    <option
                        value="../exports/json/analysis/ertragsgesetzliche-kostenfunktionen/kennzahlen-graphisch-k3.json">
                        kennzahlen-graphisch-k3.json</option>
                    <option
                        value="../exports/json/analysis/ertragsgesetzliche-kostenfunktionen/kennzahlen-rechnerisch-k3.json">
                        kennzahlen-rechnerisch-k3.json</option>
                    <option
                        value="../exports/json/analysis/ertragsgesetzliche-kostenfunktionen/nachweis-parameter.json">
                        nachweis-parameter.json</option>
                    <option value="../exports/json/analysis/ertragsgesetzliche-kostenfunktionen/nachweis.json">
                        nachweis.json</option>
                    <option
                        value="../exports/json/analysis/ertragsgesetzliche-kostenfunktionen/steckbrief-kennzahlen-k3.json">
                        steckbrief-kennzahlen-k3.json</option>
                </optgroup>
                <optgroup label="analysis / ganzrationale-oekonomische-funktionen">
                    <option value="../exports/json/analysis/ganzrationale-oekonomische-funktionen/funktionsterme.json">
                        funktionsterme.json</option>
                    <option
                        value="../exports/json/analysis/ganzrationale-oekonomische-funktionen/kennzahlen-graphisch-e1k3.json">
                        kennzahlen-graphisch-e1k3.json</option>
                    <option
                        value="../exports/json/analysis/ganzrationale-oekonomische-funktionen/kennzahlen-graphisch-e2k3.json">
                        kennzahlen-graphisch-e2k3.json</option>
                    <option
                        value="../exports/json/analysis/ganzrationale-oekonomische-funktionen/kennzahlen-rechnerisch-e1k3.json">
                        kennzahlen-rechnerisch-e1k3.json</option>
                    <option
                        value="../exports/json/analysis/ganzrationale-oekonomische-funktionen/kennzahlen-rechnerisch-e2k3.json">
                        kennzahlen-rechnerisch-e2k3.json</option>
                    <option
                        value="../exports/json/analysis/ganzrationale-oekonomische-funktionen/steckbrief-kennzahlen.json">
                        steckbrief-kennzahlen.json</option>
                </optgroup>
                <optgroup label="analysis / lineare-funktionen">
                    <option value="../exports/json/analysis/lineare-funktionen/nullstellen.json">nullstellen.json
                    </option>
                </optgroup>
                <optgroup label="analysis / quadratische-funktionen">
                    <option value="../exports/json/analysis/quadratische-funktionen/nullstellen.json">nullstellen.json
                    </option>
                </optgroup>
                <optgroup label="analysis / marktgleichgewicht-grundlagen">
                    <option value="../exports/json/analysis/marktgleichgewicht-grundlagen/kennzahlen-definition.json">
                        kennzahlen-definition.json</option>
                    <option
                        value="../exports/json/analysis/marktgleichgewicht-grundlagen/kennzahlen-graphisch-linear.json">
                        kennzahlen-graphisch-linear.json</option>
                    <option
                        value="../exports/json/analysis/marktgleichgewicht-grundlagen/kennzahlen-rechnerisch-linear.json">
                        kennzahlen-rechnerisch-linear.json</option>
                    <option
                        value="../exports/json/analysis/marktgleichgewicht-grundlagen/marktungleichgewicht-bestimmung.json">
                        marktungleichgewicht-bestimmung.json</option>
                </optgroup>
                <optgroup label="analysis / marktgleichgewicht-vertiefung">
                    <option
                        value="../exports/json/analysis/marktgleichgewicht-vertiefung/kennzahlen-graphisch-allgemein.json">
                        kennzahlen-graphisch-allgemein.json</option>
                    <option
                        value="../exports/json/analysis/marktgleichgewicht-vertiefung/kennzahlen-rechnerisch-lqe.json">
                        kennzahlen-rechnerisch-lqe.json</option>
                    <option value="../exports/json/analysis/marktgleichgewicht-vertiefung/renten-bestimmung-prkr.json">
                        renten-bestimmung-prkr.json</option>
                    <option
                        value="../exports/json/analysis/marktgleichgewicht-vertiefung/abschoepfung-kr-bestimmung-preis.json">
                        abschoepfung-kr-bestimmung-preis.json</option>
                </optgroup>
            </select>
            <button id="loadBtn" type="button">Laden</button>
            <label class="inline-option">
                <input id="showSolutions" type="checkbox" />
                Lösungen anzeigen
            </label>
        </section>

        <section id="status" class="status"></section>
        <section id="list" class="list"></section>
    </main>
</body>

</html>
