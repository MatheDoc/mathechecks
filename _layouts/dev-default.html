<!DOCTYPE html>
<html lang="de">

<head>
    {% include dev/head.html %}
    {% include mathjax.html %}
</head>

<body class="page-dev-default {{ page.body_class | default: 'page-dashboard' }}"
    data-lernbereich="{{ page.lernbereich | default: '' | escape }}"
    data-module-key="{{ page.module_key | default: '' | escape }}"
    data-prototype-key="{{ page.prototype_key | default: '' | escape }}">
    <div class="shell">
        {% include dev/topbar.html %}
        <main class="dev-default-main">
            {{ content }}
        </main>
    </div>
    {% include dev/calculator.html %}
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <script src="{{ '/assets/js/zeichneGraph.js' | relative_url }}"></script>
    <script src="{{ '/dev/assets/js/calculator/utils.js' | relative_url }}"></script>
    <script src="{{ '/dev/assets/js/calculator/commands.js' | relative_url }}"></script>
    <script src="{{ '/dev/assets/js/calculator/app.js' | relative_url }}"></script>
    {% if page.module_script %}
    <script type="module" src="{{ page.module_script | relative_url }}"></script>
    {% endif %}
    {% include dev/theme-script.html %}
    {{ page.after_scripts }}
</body>

</html>
