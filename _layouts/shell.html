<!DOCTYPE html>
<html lang="de">

<head>
    {% include head.html %}
    {% include mathjax.html %}
    {% include supabase-runtime-config.html %}
</head>

<body class="page-shell {{ page.body_class | default: 'page-dashboard' }}"
    data-lernbereich="{{ page.lernbereich | default: '' | escape }}"
    data-module-key="{{ page.module_key | default: '' | escape }}"
    data-prototype-key="{{ page.prototype_key | default: '' | escape }}"
    data-checks-url="{{ '/checks.json' | relative_url }}">
    <div class="shell">
        {% include topbar.html %}
        <main class="shell-main">
            {{ content }}
        </main>
    </div>
    {% include calculator.html %}
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <script type="module"
        src="{{ '/assets/js/visuals/calculator-graph-bridge.js?v=20260512-visual-graph' | relative_url }}"></script>
    <script
        src="{{ '/assets/js/calculator/utils.js?v=20260512-calculator-integral-t-variable' | relative_url }}"></script>
    <script
        src="{{ '/assets/js/calculator/commands.js?v=20260512-calculator-integral-t-variable' | relative_url }}"></script>
    <script
        src="{{ '/assets/js/calculator/app.js?v=20260512-calculator-integral-builder-t-button' | relative_url }}"></script>
    {% if page.module_script %}
    <script type="module" src="{{ page.module_script | relative_url }}"></script>
    {% endif %}
    {% include theme-script.html %}
    <script type="module" src="{{ '/assets/js/modules/auth-shell.js?v=20260521-feed-deterministic-tabs' | relative_url }}"></script>
    {{ page.after_scripts }}
</body>

</html>
