<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <!-- Axes -->
  <line x1="30" y1="135" x2="220" y2="135" stroke="#7c6aff" stroke-width="1" opacity=".3"/>
  <line x1="30" y1="135" x2="30" y2="15" stroke="#7c6aff" stroke-width="1" opacity=".3"/>
  <!-- Supply curve -->
  <path d="M40 125 Q100 90 130 70 Q170 45 200 30" stroke="#7c6aff" stroke-width="2" fill="none" opacity=".7"/>
  <!-- Demand curve -->
  <path d="M40 30 Q80 50 130 70 Q170 88 200 125" stroke="#3dd6c8" stroke-width="2" fill="none" opacity=".7"/>
  <!-- Consumer surplus (area above price, below demand) -->
  <path d="M40 30 Q80 50 130 70 L130 70 L30 70 L30 30 Z" fill="#3dd6c8" opacity=".1"/>
  <!-- Producer surplus (area below price, above supply) -->
  <path d="M40 125 Q100 90 130 70 L30 70 L30 125 Z" fill="#7c6aff" opacity=".1"/>
  <!-- Equilibrium point -->
  <circle cx="130" cy="70" r="5" fill="#f5a623" opacity=".8"/>
  <!-- Price line -->
  <line x1="30" y1="70" x2="130" y2="70" stroke="#f5a623" stroke-width="1" stroke-dasharray="4 3" opacity=".4"/>
  <!-- Labels -->
  <text x="55" y="52" font-family="system-ui" font-size="9" fill="#3dd6c8" opacity=".6">KR</text>
  <text x="55" y="100" font-family="system-ui" font-size="9" fill="#7c6aff" opacity=".6">PR</text>
</svg>
