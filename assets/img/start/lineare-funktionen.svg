<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <!-- Axes -->
  <line x1="30" y1="135" x2="220" y2="135" stroke="#7c6aff" stroke-width="1" opacity=".3"/>
  <line x1="30" y1="135" x2="30" y2="15" stroke="#7c6aff" stroke-width="1" opacity=".3"/>
  <!-- Line 1: y = 0.6x + 20 -->
  <line x1="30" y1="110" x2="210" y2="35" stroke="#7c6aff" stroke-width="2" opacity=".7"/>
  <!-- Line 2: y = -0.4x + 90 -->
  <line x1="40" y1="40" x2="210" y2="105" stroke="#3dd6c8" stroke-width="2" opacity=".7"/>
  <!-- Intersection point -->
  <circle cx="130" cy="70" r="5" fill="#f5a623" opacity=".8"/>
  <!-- Dashed lines to axes -->
  <line x1="130" y1="70" x2="130" y2="135" stroke="#f5a623" stroke-width="1" stroke-dasharray="4 3" opacity=".4"/>
  <line x1="130" y1="70" x2="30" y2="70" stroke="#f5a623" stroke-width="1" stroke-dasharray="4 3" opacity=".4"/>
  <!-- Labels -->
  <text x="215" y="32" font-family="system-ui" font-size="10" fill="#7c6aff" opacity=".6">f</text>
  <text x="215" y="108" font-family="system-ui" font-size="10" fill="#3dd6c8" opacity=".6">g</text>
</svg>
