<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <!-- Axes -->
  <line x1="30" y1="135" x2="220" y2="135" stroke="#7c6aff" stroke-width="1" opacity=".3"/>
  <line x1="120" y1="150" x2="120" y2="10" stroke="#7c6aff" stroke-width="1" opacity=".3"/>
  <!-- Parabola: y_svg = (100/5184)*(x-120)^2 + 35, vertex (120,35), roots at x=48,192 -->
  <polyline points="40,159 44,146 48,135 52,124 56,114 60,104 64,96 68,87 72,79 76,72 80,66 84,60 88,55 92,50 96,46 100,43 104,40 108,38 112,36 116,35 120,35 124,35 128,36 132,38 136,40 140,43 144,46 148,50 152,55 156,60 160,66 164,72 168,79 172,87 176,96 180,104 184,114 188,124 192,135 196,146 200,159"
        stroke="#7c6aff" stroke-width="2.5" opacity=".8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Vertex -->
  <circle cx="120" cy="35" r="4.5" fill="#f5a623" opacity=".85"/>
