<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <!-- Probability bars -->
  <rect x="40" y="90" width="24" height="40" rx="3" fill="#7c6aff" opacity=".35"/>
  <rect x="72" y="50" width="24" height="80" rx="3" fill="#7c6aff" opacity=".55"/>
  <rect x="104" y="70" width="24" height="60" rx="3" fill="#7c6aff" opacity=".45"/>
  <rect x="136" y="30" width="24" height="100" rx="3" fill="#7c6aff" opacity=".7"/>
  <rect x="168" y="80" width="24" height="50" rx="3" fill="#7c6aff" opacity=".4"/>
  <!-- Baseline -->
  <line x1="32" y1="132" x2="200" y2="132" stroke="#7c6aff" stroke-width="1" opacity=".3"/>
  <!-- E(X) dashed line -->
  <line x1="32" y1="62" x2="200" y2="62" stroke="#3dd6c8" stroke-width="1.5" stroke-dasharray="6 4" opacity=".6"/>
  <!-- E(X) label -->
  <text x="208" y="66" font-family="system-ui" font-size="11" fill="#3dd6c8" opacity=".7">E(X)</text>
  <!-- x labels -->
  <text x="52" y="146" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c6aff" opacity=".5">x₁</text>
  <text x="84" y="146" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c6aff" opacity=".5">x₂</text>
  <text x="116" y="146" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c6aff" opacity=".5">x₃</text>
  <text x="148" y="146" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c6aff" opacity=".5">x₄</text>
  <text x="180" y="146" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c6aff" opacity=".5">x₅</text>
</svg>
