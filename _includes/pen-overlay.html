<canvas id="pen-canvas" aria-hidden="true"></canvas>

<div id="pen-toolbar" role="toolbar" aria-label="Stift-Werkzeuge">
  <!-- Toggle: immer sichtbar -->
  <button class="pen-fab" id="pen-btn-toggle" title="Stiftmodus aktivieren" aria-pressed="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21.17 6.81a1 1 0 0 0-3.98-3.99L3.84 16.17a2 2 0 0 0-.5.83l-1.32 4.35a.5.5 0 0 0 .62.63l4.35-1.32a2 2 0 0 0 .83-.5z"/><path d="m15 5 4 4"/></svg>
  </button>

  <!-- Werkzeuge -->
  <button class="pen-fab pen-tool pen-tool-active" id="pen-btn-pen"    title="Stift (P)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
  </button>
  <button class="pen-fab pen-tool"                 id="pen-btn-marker" title="Textmarker (M)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 11-6 6v3h9l3-3"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
  </button>
  <button class="pen-fab pen-tool"                 id="pen-btn-lasso"  title="Lasso-Auswahl (L)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 22a5 5 0 0 1-2-4"/><path d="M3.3 14A6.8 6.8 0 0 1 2 10c0-4.4 4.5-8 10-8s10 3.6 10 8-4.5 8-10 8a12 12 0 0 1-5-1"/><circle cx="5" cy="16" r="2"/></svg>
  </button>
  <button class="pen-fab pen-tool"                 id="pen-btn-erase"  title="Radierer (E)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m7 21-4.3-4.3a1 1 0 0 1 0-1.4l9.6-9.6a1 1 0 0 1 1.4 0l5.6 5.6a1 1 0 0 1 0 1.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
  </button>

  <!-- Stift-Farben -->
  <button class="pen-color-dot pen-tool selected" id="pc-blue"   data-mode="pen"    data-color="#3b82f6" style="background:#3b82f6" title="Blau"></button>
  <button class="pen-color-dot pen-tool"          id="pc-green"  data-mode="pen"    data-color="#22c55e" style="background:#22c55e" title="Grün"></button>
  <button class="pen-color-dot pen-tool"          id="pc-red"    data-mode="pen"    data-color="#ef4444" style="background:#ef4444" title="Rot"></button>
  <button class="pen-color-dot pen-tool"          id="pc-orange" data-mode="pen"    data-color="#f97316" style="background:#f97316" title="Orange"></button>

  <!-- Marker-Farben (kräftige Highlighter-Pigmente; initial versteckt, JS übernimmt) -->
  <button class="pen-color-dot pen-tool selected" id="mc-yellow" data-mode="marker" data-color="#ffe600" style="background:#ffe600" title="Gelb"></button>
  <button class="pen-color-dot pen-tool"          id="mc-green"  data-mode="marker" data-color="#6fe000" style="background:#6fe000" title="Grün"></button>
  <button class="pen-color-dot pen-tool"          id="mc-cyan"   data-mode="marker" data-color="#00d8e8" style="background:#00d8e8" title="Türkis"></button>
  <button class="pen-color-dot pen-tool"          id="mc-rose"   data-mode="marker" data-color="#ff4db8" style="background:#ff4db8" title="Pink"></button>

  <div class="pen-fab-sep pen-tool"></div>

  <button class="pen-fab pen-tool"  id="pen-btn-undo"       title="Rückgängig (Strg+Z)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
  </button>
  <button class="pen-fab pen-tool"  id="pen-btn-delete-sel" title="Auswahl löschen (Entf)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
  </button>
  <button class="pen-fab pen-tool"  id="pen-btn-clear"      title="Alles löschen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
  </button>
</div>

<div id="pen-lasso-hint" role="status" aria-live="polite"></div>

<script type="module" src="{{ '/assets/js/modules/pen-overlay.js?v=20260609-marker-cursor' | relative_url }}"></script>
