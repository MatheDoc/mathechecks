<canvas id="pen-canvas" aria-hidden="true"></canvas>

<div id="pen-toolbar" role="toolbar" aria-label="Stift-Werkzeuge">
  <!-- Toggle: immer sichtbar -->
  <button class="pen-fab" id="pen-btn-toggle" title="Stiftmodus aktivieren" aria-pressed="false">✏</button>

  <!-- Werkzeuge -->
  <button class="pen-fab pen-tool pen-tool-active" id="pen-btn-pen"    title="Stift (P)">✒</button>
  <button class="pen-fab pen-tool"                 id="pen-btn-marker" title="Textmarker (M)">▬</button>
  <button class="pen-fab pen-tool"                 id="pen-btn-lasso"  title="Lasso-Auswahl (L)">⬡</button>
  <button class="pen-fab pen-tool"                 id="pen-btn-erase"  title="Radierer (E)">◻</button>

  <!-- Stift-Farben -->
  <button class="pen-color-dot pen-tool selected" id="pc-blue"   data-mode="pen"    data-color="#3b82f6" style="background:#3b82f6" title="Blau"></button>
  <button class="pen-color-dot pen-tool"          id="pc-green"  data-mode="pen"    data-color="#22c55e" style="background:#22c55e" title="Grün"></button>
  <button class="pen-color-dot pen-tool"          id="pc-red"    data-mode="pen"    data-color="#ef4444" style="background:#ef4444" title="Rot"></button>
  <button class="pen-color-dot pen-tool"          id="pc-orange" data-mode="pen"    data-color="#f97316" style="background:#f97316" title="Orange"></button>

  <!-- Marker-Farben (initial versteckt, JS übernimmt) -->
  <button class="pen-color-dot pen-tool selected" id="mc-yellow" data-mode="marker" data-color="#fde047" style="background:#fde047" title="Gelb"></button>
  <button class="pen-color-dot pen-tool"          id="mc-green"  data-mode="marker" data-color="#86efac" style="background:#86efac" title="Grün"></button>
  <button class="pen-color-dot pen-tool"          id="mc-cyan"   data-mode="marker" data-color="#67e8f9" style="background:#67e8f9" title="Türkis"></button>
  <button class="pen-color-dot pen-tool"          id="mc-rose"   data-mode="marker" data-color="#fda4af" style="background:#fda4af" title="Hellrot"></button>

  <div class="pen-fab-sep pen-tool"></div>

  <button class="pen-fab pen-tool"  id="pen-btn-undo"       title="Rückgängig (Strg+Z)">↩</button>
  <button class="pen-fab pen-tool"  id="pen-btn-delete-sel" title="Auswahl löschen (Entf)">✕</button>
  <button class="pen-fab pen-tool"  id="pen-btn-clear"      title="Alles löschen">⊘</button>
</div>

<div id="pen-lasso-hint" role="status" aria-live="polite"></div>

<script type="module" src="{{ '/assets/js/modules/pen-overlay.js?v=20260602-scratch-erase' | relative_url }}"></script>
