<aside class="feed-sidebar" id="feedSidebar" data-feed-sidebar-checks-url="{{ '/checks.json' | relative_url }}" hidden>
    <div class="sidebar-brand">
        <button class="sidebar-toggle" id="sidebarToggle" title="Aktionsfeed ausblenden"
            aria-label="Aktionsfeed aus- oder einblenden" aria-expanded="true">&#8249;</button>
    </div>
    <div class="sidebar-body">
        <ul class="action-list" data-feed-sidebar-list>
            <li class="action-card action-featured" data-type="feed" style="cursor:default;">
                <div class="action-icon action-icon-featured"
                    style="background:linear-gradient(135deg,var(--accent),var(--teal));color:#fff;">…</div>
                <div class="action-body">
                    <div class="action-title">Feed wird geladen</div>
                    <div class="action-desc">Deine nächsten Aktivitäten werden vorbereitet.</div>
                    <div class="action-badges">
                        <span class="action-badge">Feed</span>
                    </div>
                </div>
            </li>
        </ul>
    </div>
</aside>
