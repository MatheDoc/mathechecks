<div class="page-shell w-narrow">
    <section id="flashcards-root"
        class="check-viewport-item check-viewport-item--scroll-card check-viewport-item--narrow"
        data-lernbereich="{{ page.lernbereich | default: '' | escape }}">
        <article class="check-card check-card--flashcards flashcards-app" data-flashcards-app>
            <div class="check-card__header">
                <div class="check-card__header-left">
                    <div class="flashcards-counter-wrap">
                        <div class="flashcards-counter" id="flashcards-counter">Karten 0 von 0</div>
                    </div>
                </div>
                <div class="check-card__header-actions">
                    <details class="check-card__actions-menu">
                        <summary class="check-card__actions-trigger" aria-label="Aktionen">
                            <span class="check-card__actions-dots" aria-hidden="true">
                                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                            </span>
                        </summary>
                        <div class="check-card__actions-popover" role="menu">
                            <button type="button" class="check-card__actions-item" role="menuitem" data-fc-reset-menu>
                                <span class="check-card__actions-icon" aria-hidden="true">🗑️</span>
                                <span>Fortschritt löschen</span>
                            </button>
                        </div>
                    </details>
                </div>
            </div>
            <div class="flashcards-message" id="flashcards-message"></div>

            <div class="check-card__body flashcards-body">
                <div class="flashcards-card" id="flashcards-card" role="button" tabindex="0"
                    aria-label="Flashcard umdrehen" aria-pressed="false">
                    <div class="flashcards-inner" id="flashcards-inner">
                        <section class="flashcards-face flashcards-front" id="flashcards-front"></section>
                        <section class="flashcards-face flashcards-back" id="flashcards-back"></section>
                    </div>
                </div>

                <div class="flashcards-rating" id="flashcards-rating" aria-label="Selbsteinschaetzung">
                    <button class="flashcards-rate flashcards-rate--hard" type="button" data-grade="2" title="Schwer"
                        aria-label="Schwer">
                        <i class="fa-regular fa-face-frown" aria-hidden="true"></i>
                    </button>
                    <button class="flashcards-rate flashcards-rate--medium" type="button" data-grade="3" title="Mittel"
                        aria-label="Mittel">
                        <i class="fa-regular fa-face-meh" aria-hidden="true"></i>
                    </button>
                    <button class="flashcards-rate flashcards-rate--easy" type="button" data-grade="5" title="Leicht"
                        aria-label="Leicht">
                        <i class="fa-regular fa-face-smile" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </article>
    </section>
</div>
