<!-- Firebase Auth Modal -->
<div id="auth-modal-overlay" onclick="closeAuthModal(event)">
  <div id="auth-modal" onclick="event.stopPropagation()">
    <button type="button" class="close-btn" onclick="closeAuthModal()">&times;</button>

    <!-- Login/Register Form -->
    <div id="auth-form">
      <h2 id="form-title">Login</h2>
      <p class="subtitle" id="form-subtitle">
        Melde dich mit deinem Account an
      </p>

      <div id="message"></div>

      <form id="auth-form-element">
        <div class="form-group hidden" id="username-group">
          <label for="username">Benutzername</label>
          <input type="text" id="username" placeholder="Dein Benutzername" maxlength="30" />
        </div>
        <div class="form-group">
          <label for="email">E-Mail</label>
          <input type="email" id="email" required placeholder="deine@email.de" />
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" required placeholder="Mindestens 6 Zeichen" />
          <div class="forgot-password-row" id="forgot-password-row">
            <button type="button" class="link-button" id="forgot-password-btn">
              Passwort vergessen?
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">
          Login
        </button>
      </form>

      <div class="toggle-text">
        <span id="toggle-text">Noch kein Account?</span>
        <span class="toggle-link" id="toggle-mode">Jetzt registrieren</span>
      </div>
    </div>

    <!-- User Info (when logged in) -->
    <div id="user-info" class="hidden user-info">
      <div class="avatar">👤</div>
      <h2 id="display-username">Willkommen!</h2>
      <p class="subtitle">Du bist eingeloggt</p>
      <div class="user-email" id="display-email"></div>
      <div class="user-id">
        <div class="user-id-label">User ID:</div>
        <div class="user-id-value" id="display-uid"></div>
      </div>

      <div id="user-message"></div>

      <!-- Benutzername ändern -->
      <div class="account-section">
        <button type="button" class="btn btn-secondary" id="change-username-toggle">Benutzername ändern</button>
        <div id="change-username-form" class="hidden">
          <div class="form-group">
            <label for="new-username">Neuer Benutzername</label>
            <input type="text" id="new-username" placeholder="Neuer Benutzername" minlength="3" maxlength="30" />
          </div>
          <div class="btn-row">
            <button type="button" class="btn btn-primary btn-sm" id="change-username-btn">Speichern</button>
            <button type="button" class="btn btn-cancel btn-sm" id="change-username-cancel">Abbrechen</button>
          </div>
        </div>
      </div>

      <div class="account-actions">
        <button class="btn btn-danger" id="logout-btn">Logout</button>
        <button type="button" class="btn btn-danger-outline" id="delete-account-toggle">Account löschen</button>
      </div>

      <!-- Account löschen: Bestätigung -->
      <div id="delete-account-confirm" class="hidden danger-zone">
        <p class="danger-text">Dein Account und alle Daten werden unwiderruflich gelöscht.</p>
        <div class="form-group">
          <label for="delete-confirm-password">Passwort zur Bestätigung</label>
          <input type="password" id="delete-confirm-password" placeholder="Dein Passwort" />
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn-danger btn-sm" id="delete-account-btn">Endgültig löschen</button>
          <button type="button" class="btn btn-cancel btn-sm" id="delete-account-cancel">Abbrechen</button>
        </div>
      </div>
    </div>
  </div>
</div>
