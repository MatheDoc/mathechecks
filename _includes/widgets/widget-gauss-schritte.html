<div class="skript-widget gauss-widget"
     data-id="{{ include.id }}"
     data-matrix='{{ include.matrix }}'
     data-steps='{{ include.steps }}'>
    <div class="gauss-history"></div>
    <div class="gauss-step-label"></div>
    <div class="gauss-controls">
        <button type="button" class="gauss-prev">&larr; zurück</button>
        <button type="button" class="gauss-next">weiter &rarr;</button>
        <button type="button" class="gauss-reset" aria-label="zurücksetzen" title="zurücksetzen">&#x21bb;</button>
    </div>
</div>
