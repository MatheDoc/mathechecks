<div class="skript-widget hb-widget">
    <div class="widget-controls">
        <div class="widget-row">
            <label>n = <span class="hb-nWert">10</span></label>
            <input type="range" class="hb-nSlider" min="1" max="50" value="10">
        </div>
        <div class="widget-row">
            <label>p = <span class="hb-pWert">0,50</span></label>
            <input type="range" class="hb-pSlider" min="0" max="1" value="0.5" step="0.01">
        </div>
        <div class="widget-row">
            <label>a = <span class="hb-aWert">3</span></label>
            <input type="range" class="hb-aSlider" min="0" max="10" value="3">
        </div>
        <div class="widget-row">
            <label>b = <span class="hb-bWert">7</span></label>
            <input type="range" class="hb-bSlider" min="0" max="10" value="7">
        </div>
        <div class="widget-row">
            <label>
                <input type="checkbox" class="hb-autoY" checked>
                y-Achse automatisch skalieren
            </label>
        </div>
        <div class="widget-row widget-row--center">
            <span class="hb-intervallWert"></span>
        </div>
    </div>

    <div class="widget-outputs">
        <div class="hb-plotEinzeln diagramm"></div>
        <div class="hb-plotKumuliert diagramm"></div>
    </div>
</div>
