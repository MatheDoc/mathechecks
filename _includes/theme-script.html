<script>
    (function () {
        const root = document.documentElement;
        const topbar = document.querySelector('.topbar');
        if (!root || !topbar) return;

        function syncModuleStickyTop() {
            root.style.setProperty('--module-sticky-top', `${topbar.offsetHeight}px`);
        }

        syncModuleStickyTop();
        window.addEventListener('resize', syncModuleStickyTop);
    })();

    (function () {
        const THEME_KEY = 'mathechecks-theme';
        const toggles = Array.from(document.querySelectorAll('[data-theme-toggle="true"]'));
        if (!toggles.length) return;

        function applyThemeState(isLight) {
            document.documentElement.classList.toggle('light', isLight);
            toggles.forEach((toggle) => toggle.classList.toggle('active', isLight));
        }

        applyThemeState(localStorage.getItem(THEME_KEY) === 'light');

        toggles.forEach((toggle) => {
            toggle.addEventListener('click', () => {
                const isLight = !document.documentElement.classList.contains('light');
                localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
                location.reload();
            });
        });
    })();

    (function () {
        const NAV_KEY = 'mathechecks-module-nav';
        const buttons = Array.from(document.querySelectorAll('[data-nav-toggle="true"]'));
        if (!buttons.length) return;

        function applyNavState(isVisible) {
            document.body.classList.toggle('nav-hidden', !isVisible);
            buttons.forEach((btn) => btn.classList.toggle('active', isVisible));
        }

        applyNavState(localStorage.getItem(NAV_KEY) !== 'hidden');

        buttons.forEach((btn) => {
            btn.addEventListener('click', () => {
                const willBeVisible = document.body.classList.contains('nav-hidden');
                localStorage.setItem(NAV_KEY, willBeVisible ? 'visible' : 'hidden');
                applyNavState(willBeVisible);
            });
        });
    })();

    (function () {
        const actionsMenu = document.querySelector('.topbar-actions-menu');
        if (!actionsMenu) return;

        const menuItems = Array.from(actionsMenu.querySelectorAll('.topbar-actions-item'));
        menuItems.forEach((item) => {
            item.addEventListener('click', () => {
                window.setTimeout(() => actionsMenu.removeAttribute('open'), 0);
            });
        });

        document.addEventListener('click', (event) => {
            if (!actionsMenu.hasAttribute('open')) return;
            if (actionsMenu.contains(event.target)) return;
            actionsMenu.removeAttribute('open');
        });

        document.addEventListener('keydown', (event) => {
            if (event.key !== 'Escape') return;
            actionsMenu.removeAttribute('open');
        });
    })();

    (function () {
        const CALCULATOR_OVERLAY_STATE_KEY = 'calculator-overlay-open-v1';
        const toggleButtons = Array.from(document.querySelectorAll('.calculator-toggle, #calculatorToggleMenu'));

        function loadCalculatorOverlayState() {
            try {
                return localStorage.getItem(CALCULATOR_OVERLAY_STATE_KEY) === '1';
            } catch {
                return false;
            }
        }

        function saveCalculatorOverlayState(isOpen) {
            try {
                localStorage.setItem(CALCULATOR_OVERLAY_STATE_KEY, isOpen ? '1' : '0');
            } catch {
                // ignore storage issues
            }
        }

        function updateCalculatorToggleButtons(isOpen) {
            toggleButtons.forEach((button) => {
                button.classList.toggle('is-active', isOpen);
                button.classList.toggle('active', isOpen);
                button.setAttribute('aria-pressed', isOpen ? 'true' : 'false');
            });
        }

        function toggleCalculatorOverlay(forceOpen) {
            const overlay = document.getElementById('calculator-overlay');
            if (!overlay) return;

            const hasOpenOverride = typeof forceOpen === 'boolean';
            const isOpen = overlay.classList.contains('open');
            const shouldOpen = hasOpenOverride ? forceOpen : !isOpen;

            overlay.classList.toggle('open', shouldOpen);
            overlay.setAttribute('aria-hidden', shouldOpen ? 'false' : 'true');
            saveCalculatorOverlayState(shouldOpen);
            updateCalculatorToggleButtons(shouldOpen);

            if (!shouldOpen && typeof window.clearStoredCalculatorPopupState === 'function') {
                window.clearStoredCalculatorPopupState();
            }

            if (shouldOpen) {
                if (typeof window.restoreCalculatorPopupState === 'function') {
                    window.restoreCalculatorPopupState();
                }

                window.setTimeout(() => {
                    if (typeof window.focusCalculatorMainInput === 'function') {
                        window.focusCalculatorMainInput();
                        return;
                    }

                    const mainInput = document.getElementById('mainInput');
                    if (mainInput) mainInput.focus();
                }, 100);
            }
        }

        window.toggleCalculatorOverlay = toggleCalculatorOverlay;

        const calculatorMenuButton = document.getElementById('calculatorToggleMenu');
        if (calculatorMenuButton && calculatorMenuButton.dataset.boundCalculator !== 'true') {
            calculatorMenuButton.dataset.boundCalculator = 'true';
            calculatorMenuButton.addEventListener('click', () => {
                toggleCalculatorOverlay();
            });
        }

        updateCalculatorToggleButtons(false);
        if (loadCalculatorOverlayState()) {
            toggleCalculatorOverlay(true);
        }
    })();

    (function () {
        const feedSidebar = document.getElementById('feedSidebar');
        if (!feedSidebar) return;

        const feedCards = Array.from(feedSidebar.querySelectorAll('.action-card[data-feed-slot]'));
        if (feedCards.length === 0) return;

        const searchParams = new URLSearchParams(window.location.search);
        const lernbereich =
            (typeof window.lernbereich === 'string' && window.lernbereich.trim()) ||
            searchParams.get('lernbereich') ||
            document.body?.dataset?.lernbereich ||
            '';

        if (!lernbereich) return;

        fetch('/checks.json')
            .then((response) => {
                if (!response.ok) {
                    throw new Error('checks.json konnte nicht geladen werden');
                }
                return response.json();
            })
            .then((entries) => {
                if (!Array.isArray(entries)) return;

                const checks = entries
                    .filter((entry) => entry && entry.Lernbereich === lernbereich)
                    .sort((a, b) => (Number(a.Nummer) || 0) - (Number(b.Nummer) || 0));

                if (checks.length === 0) return;

                feedCards.forEach((card, index) => {
                    const titleNode = card.querySelector('.action-title');
                    if (!titleNode) return;

                    const slot = Number(card.dataset.feedSlot) || index + 1;
                    const check = checks[slot - 1] || checks[index];
                    if (!check) return;

                    const schlagwort = typeof check.Schlagwort === 'string' ? check.Schlagwort.trim() : '';
                    if (schlagwort) {
                        titleNode.textContent = schlagwort;
                    }
                });
            })
            .catch(() => {
                // Keep the hardcoded fallback labels when dynamic feed data is unavailable.
            });
    })();

    (function () {
        const analyticsState = window.MatheChecksAnalytics;
        if (!analyticsState || !analyticsState.measurementId) return;

        const consentStorageKey = analyticsState.consentStorageKey;
        const root = document.documentElement;
        const body = document.body;
        if (!body) return;

        let bannerNode = null;
        let settingsNode = null;
        let analyticsToggleNode = null;
        let hintNode = null;

        function readConsent() {
            return analyticsState.readConsent?.() || null;
        }

        function writeConsent(consent) {
            try {
                window.localStorage.setItem(consentStorageKey, JSON.stringify(consent));
            } catch {
                // Ignore storage failures and still apply the selection for the current page.
            }
        }

        function syncToggleFromConsent() {
            if (!analyticsToggleNode) return;
            analyticsToggleNode.checked = Boolean(readConsent()?.analytics);
        }

        function syncHint() {
            if (!hintNode) return;
            const hasConsent = Boolean(readConsent()?.analytics);
            hintNode.textContent = hasConsent
                ? 'Google Analytics ist aktuell aktiviert.'
                : 'Google Analytics ist aktuell deaktiviert.';
        }

        function closeSettings() {
            if (!settingsNode) return;
            settingsNode.hidden = true;
            root.classList.remove('privacy-settings-open');
        }

        function openSettings() {
            ensureUi();
            syncToggleFromConsent();
            syncHint();
            settingsNode.hidden = false;
            root.classList.add('privacy-settings-open');
            window.setTimeout(() => analyticsToggleNode?.focus(), 0);
        }

        function hideBanner() {
            if (!bannerNode) return;
            bannerNode.hidden = true;
        }

        function showBannerIfNeeded() {
            ensureUi();
            bannerNode.hidden = Boolean(readConsent());
        }

        function applyConsent(consent) {
            writeConsent(consent);
            if (consent.analytics) {
                analyticsState.loadAnalytics?.();
            } else {
                analyticsState.disableAnalytics?.();
            }
            syncHint();
            hideBanner();
            closeSettings();
        }

        function buildBanner() {
            const node = document.createElement('aside');
            node.className = 'privacy-banner';
            node.hidden = true;
            node.setAttribute('aria-label', 'Tracking-Einwilligung');
            node.innerHTML = `
                <div class="privacy-banner__content">
                    <p class="privacy-banner__title">Datenschutz und Nutzungsstatistik</p>
                    <p class="privacy-banner__text">Diese Website kann Google Analytics zur anonymisierten Nutzungsanalyse laden. Analytics wird erst nach Ihrer Einwilligung aktiviert. Details finden Sie in der <a href="/datenschutz.html">Datenschutzerklärung</a>.</p>
                </div>
                <div class="privacy-banner__actions">
                    <button type="button" class="privacy-button privacy-button--ghost" data-privacy-action="essential">Nur erforderlich</button>
                    <button type="button" class="privacy-button privacy-button--ghost" data-privacy-action="settings">Einstellungen</button>
                    <button type="button" class="privacy-button privacy-button--primary" data-privacy-action="accept">Alle akzeptieren</button>
                </div>
            `;

            node.addEventListener('click', (event) => {
                const action = event.target.closest('[data-privacy-action]')?.dataset.privacyAction;
                if (!action) return;

                if (action === 'essential') {
                    applyConsent({ analytics: false, updatedAt: new Date().toISOString() });
                    return;
                }

                if (action === 'accept') {
                    applyConsent({ analytics: true, updatedAt: new Date().toISOString() });
                    return;
                }

                openSettings();
            });

            return node;
        }

        function buildSettings() {
            const node = document.createElement('div');
            node.className = 'privacy-settings';
            node.hidden = true;
            node.innerHTML = `
                <div class="privacy-settings__backdrop" data-privacy-close="true"></div>
                <div class="privacy-settings__panel" role="dialog" aria-modal="true" aria-labelledby="privacy-settings-title">
                    <button type="button" class="privacy-settings__close" aria-label="Tracking-Einstellungen schließen" data-privacy-close="true">×</button>
                    <p class="privacy-settings__eyebrow">Tracking-Einstellungen</p>
                    <h2 id="privacy-settings-title" class="privacy-settings__title">Google Analytics</h2>
                    <p class="privacy-settings__text">Sie können entscheiden, ob Google Analytics zur anonymisierten Reichweitenmessung geladen werden darf. Ohne Einwilligung bleibt Analytics deaktiviert.</p>
                    <label class="privacy-settings__toggle">
                        <input id="privacy-analytics-toggle" type="checkbox">
                        <span>
                            <strong>Nutzungsstatistik mit Google Analytics</strong>
                            <small>Hilft dabei, Seitenaufrufe und Nutzungsmuster statistisch auszuwerten.</small>
                        </span>
                    </label>
                    <p class="privacy-settings__hint" id="privacy-settings-hint"></p>
                    <div class="privacy-settings__actions">
                        <button type="button" class="privacy-button privacy-button--ghost" data-privacy-save="essential">Nur erforderlich</button>
                        <button type="button" class="privacy-button privacy-button--ghost" data-privacy-close="true">Abbrechen</button>
                        <button type="button" class="privacy-button privacy-button--primary" data-privacy-save="custom">Speichern</button>
                    </div>
                </div>
            `;

            analyticsToggleNode = node.querySelector('#privacy-analytics-toggle');
            hintNode = node.querySelector('#privacy-settings-hint');

            node.addEventListener('click', (event) => {
                if (event.target.closest('[data-privacy-close="true"]')) {
                    closeSettings();
                    return;
                }

                const saveAction = event.target.closest('[data-privacy-save]')?.dataset.privacySave;
                if (!saveAction) return;

                if (saveAction === 'essential') {
                    applyConsent({ analytics: false, updatedAt: new Date().toISOString() });
                    return;
                }

                applyConsent({
                    analytics: Boolean(analyticsToggleNode?.checked),
                    updatedAt: new Date().toISOString()
                });
            });

            node.addEventListener('keydown', (event) => {
                if (event.key !== 'Escape') return;
                closeSettings();
            });

            return node;
        }

        function ensureUi() {
            if (!bannerNode) {
                bannerNode = buildBanner();
                body.appendChild(bannerNode);
            }

            if (!settingsNode) {
                settingsNode = buildSettings();
                body.appendChild(settingsNode);
            }
        }

        window.showCookieSettings = function showCookieSettings() {
            openSettings();
            return false;
        };

        showBannerIfNeeded();
    })();
</script>
