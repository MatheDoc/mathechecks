<div class="diagramm-row">
    <div class="eingabe-box">

        <div class="eingabe-zeile">
            <label>n =</label>
            <input type="range" class="hb-nSlider" min="1" max="50" value="10">
            <input type="text" class="hb-nInput" value="10" style="width:4em">
        </div>

        <div class="eingabe-zeile">
            <label>p =</label>
            <input type="range" class="hb-pSlider" min="0" max="1" value="0.5" step="0.01">
            <input type="text" class="hb-pInput" value="0.5" style="width:4em">
        </div>

        <div class="eingabe-zeile">
            <label>a =</label>
            <input type="range" class="hb-aSlider" min="0" max="10" value="3">
            <input type="text" class="hb-aInput" value="3" style="width:4em">
        </div>

        <div class="eingabe-zeile">
            <label>b =</label>
            <input type="range" class="hb-bSlider" min="0" max="10" value="7">
            <input type="text" class="hb-bInput" value="7" style="width:4em">
        </div>

        <div class="eingabe-zeile">
            <label>
                <input type="checkbox" class="hb-autoY" checked>
                y-Achse automatisch skalieren
            </label>
        </div>

        <div class="eingabe-zeile" style="justify-content:center">
            <span class="hb-intervallWert"></span>
        </div>

    </div>

    <div class="hb-plotEinzeln diagramm"></div>
    <div class="hb-plotKumuliert diagramm"></div>
</div>
