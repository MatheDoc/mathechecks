<!-- Widget: Quadratische Funktionen (a, b, c in Normalform) -->
<div class="skript-widget skript-widget--aside qf-widget">
    <div class="widget-controls">
        <div class="widget-row">
            <label>$ a $ = <span class="qf-aWert">1</span></label>
            <input type="range" class="qf-aSlider" min="-3" max="3" step="0.25" value="1">
        </div>
        <div class="widget-row">
            <label>$ b $ = <span class="qf-bWert">0</span></label>
            <input type="range" class="qf-bSlider" min="-5" max="5" step="0.5" value="0">
        </div>
        <div class="widget-row">
            <label>$ c $ = <span class="qf-cWert">0</span></label>
            <input type="range" class="qf-cSlider" min="-5" max="5" step="0.5" value="0">
        </div>
        <div class="widget-row widget-row--center">
            <span class="qf-eqDisplay">$ f(x) = 1 \cdot x^2 $</span>
        </div>
    </div>

    <div class="widget-outputs">
        <div class="qf-tableWrap">
            <table class="qf-table">
                <thead>
                    <tr>
                        <th>$ x $</th>
                        <th>$ f(x) $</th>
                    </tr>
                </thead>
                <tbody class="qf-tableBody"></tbody>
            </table>
        </div>
        <div class="qf-plotGraph diagramm"></div>
    </div>
</div>
