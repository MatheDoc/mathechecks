<div class="skript-widget bvt-widget">
    <div class="widget-controls">
        <div class="widget-row">
            <label>$P(A)$ = <span class="bvt-paWert">0,50</span></label>
            <input type="range" class="bvt-paSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div class="widget-row">
            <label>$P_A(B)$ = <span class="bvt-pbaWert">0,10</span></label>
            <input type="range" class="bvt-pbaSlider" min="0" max="1" step="0.01" value="0.1">
        </div>
        <div class="widget-row">
            <label>$P_{\overline{A}}(B)$ = <span class="bvt-pbnaWert">0,30</span></label>
            <input type="range" class="bvt-pbnaSlider" min="0" max="1" step="0.01" value="0.3">
        </div>
        <div class="widget-info">
            <span>$A$ und $B$ sind stochastisch:</span>
            <span class="bvt-unabhaengigkeit"></span>
        </div>
    </div>

    <div class="widget-outputs">
        <div class="bvt-plotBaum diagramm"></div>
        <div class="bvt-plotInvers diagramm"></div>
        <div class="bvt-vierfeldertafel diagramm">
            <div class="bvt-vierfeldertafel__titel">Vier-Felder-Tafel</div>
            <table>
                <thead>
                    <tr>
                        <th></th>
                        <th>\( B \)</th>
                        <th>\( \overline{B} \)</th>
                        <th>\( \Sigma \)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>\( A \)</td>
                        <td class="bvt-ab"></td>
                        <td class="bvt-anb"></td>
                        <td class="bvt-asum"></td>
                    </tr>
                    <tr>
                        <td>\( \overline{A} \)</td>
                        <td class="bvt-nab"></td>
                        <td class="bvt-nanb"></td>
                        <td class="bvt-nasum"></td>
                    </tr>
                    <tr>
                        <td>\( \Sigma \)</td>
                        <td class="bvt-sumb"></td>
                        <td class="bvt-sumnb"></td>
                        <td class="bvt-sumsum"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
