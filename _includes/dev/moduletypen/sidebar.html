<aside class="feed-sidebar" id="feedSidebar">
    <div class="sidebar-brand">
        <button class="sidebar-toggle" id="sidebarToggle" title="Aktionsfeed ausblenden"
            aria-label="Aktionsfeed aus- oder einblenden" aria-expanded="true">&#8249;</button>
    </div>
    <div class="sidebar-body">
        <ul class="action-list">
            <li class="action-card action-featured" data-type="training" data-feed-slot="1" style="cursor:default;">
                <div class="action-icon action-icon-featured"
                    style="background:linear-gradient(135deg,var(--rose),var(--accent));color:#fff;">🏋️</div>
                <div class="action-body">
                    <div class="action-title">Extremstellen</div>
                    <div class="action-badges">
                        <span class="action-badge type-training">Training</span>
                        <span class="action-badge">jetzt faellig</span>
                    </div>
                </div>
            </li>
            <li class="action-card" data-type="training" data-feed-slot="2">
                <div class="action-icon" style="background:var(--rose-soft);color:var(--rose);">🏋️</div>
                <div class="action-body">
                    <div class="action-title">Wendepunkte</div>
                    <div class="action-badges">
                        <span class="action-badge type-training">Training</span>
                        <span class="action-badge">morgen</span>
                    </div>
                </div>
                <span class="action-arrow">›</span>
            </li>
            <li class="action-card" data-type="flashcards" data-feed-slot="3">
                <div class="action-icon" style="background:var(--teal-soft);color:var(--teal);">🧠</div>
                <div class="action-body">
                    <div class="action-title">Monotonie</div>
                    <div class="action-badges">
                        <span class="action-badge type-flashcards">Recall</span>
                        <span class="action-badge">in 2 Tagen</span>
                    </div>
                </div>
                <span class="action-arrow">›</span>
            </li>
            <li class="action-card" data-type="quiz" data-feed-slot="4">
                <div class="action-icon" style="background:rgba(167,139,250,.1);color:#a78bfa;">🎓</div>
                <div class="action-body">
                    <div class="action-title">Ableitungsregeln</div>
                    <div class="action-badges">
                        <span class="action-badge" style="background:rgba(167,139,250,.1);color:#a78bfa;">Feynman</span>
                        <span class="action-badge">in 3 Tagen</span>
                    </div>
                </div>
                <span class="action-arrow">›</span>
            </li>
            <li class="action-card" data-type="checkliste">
                <div class="action-icon" style="background:var(--green-soft);color:var(--green);">☑️</div>
                <div class="action-body">
                    <div class="action-title">Kompetenzliste</div>
                    <div class="action-badges">
                        <span class="action-badge type-checkliste">Kompetenzliste</span>
                        <span class="action-badge">in 5 Tagen</span>
                    </div>
                </div>
                <span class="action-arrow">›</span>
            </li>
        </ul>
    </div>
