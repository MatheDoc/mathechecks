<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spracheingabe Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0f11;
      --surface:  #16181c;
      --border:   #2a2d34;
      --accent:   #e8ff47;
      --accent2:  #47ffe8;
      --text:     #e8e9ec;
      --muted:    #5a5f6e;
      --danger:   #ff4747;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 0;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem 2.5rem 2.5rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 0 60px rgba(232,255,71,0.04), 0 24px 64px rgba(0,0,0,0.5);
    }

    .label-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .label-row h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .label-row .badge {
      font-size: 0.6rem;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: rgba(232,255,71,0.12);
      color: var(--accent);
      border: 1px solid rgba(232,255,71,0.25);
      padding: 2px 8px;
      border-radius: 100px;
    }

    /* Input wrapper */
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,71,0.12);
    }
    .input-wrap.listening {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(255,71,71,0.15);
      animation: pulse-border 1.4s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 3px rgba(255,71,71,0.15); }
      50%       { box-shadow: 0 0 0 6px rgba(255,71,71,0.06); }
    }

    #sprachInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      padding: 1rem 1.25rem;
      line-height: 1.5;
    }
    #sprachInput::placeholder { color: var(--muted); }

    .mic-btn {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 4px;
      border-radius: 10px;
      transition: background 0.15s;
      color: var(--muted);
    }
    .mic-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .mic-btn.active { color: var(--danger); }
    .mic-btn svg { width: 22px; height: 22px; }

    /* Ripple ring around mic button when active */
    .mic-btn.active::after {
      content: '';
      position: absolute;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--danger);
      animation: ripple 1.2s ease-out infinite;
      pointer-events: none;
    }
    @keyframes ripple {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* Status row */
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
      min-height: 1.4rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .dot.on  { background: var(--danger); animation: blink 0.8s ease-in-out infinite; }
    .dot.ok  { background: var(--accent); }
    .dot.err { background: var(--danger); }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

    /* Transcript preview */
    .interim-box {
      margin-top: 1.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 3.5rem;
      line-height: 1.6;
      font-style: italic;
      transition: color 0.2s;
    }
    .interim-box.has-text { color: var(--accent2); font-style: normal; }

    /* Controls */
    .controls {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.75rem;
    }
    .btn {
      flex: 1;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    .btn:hover { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.04); }
    .btn.primary {
      background: var(--accent);
      color: #0e0f11;
      border-color: var(--accent);
      font-weight: 500;
    }
    .btn.primary:hover { background: #d4eb30; border-color: #d4eb30; }

    /* lang selector */
    .lang-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .lang-row select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
    }
    .lang-row select:focus { border-color: var(--accent); }

    /* no-support banner */
    .no-support {
      display: none;
      margin-top: 1.5rem;
      background: rgba(255,71,71,0.08);
      border: 1px solid rgba(255,71,71,0.25);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 0.8rem;
      color: #ff9090;
      line-height: 1.5;
    }

    /* footer */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-align: center;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="label-row">
    <h1>Spracheingabe</h1>
    <span class="badge">Demo</span>
  </div>

  <div class="input-wrap" id="inputWrap">
    <input
      type="text"
      id="sprachInput"
      placeholder="Tippen oder Mikrofon nutzen …"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="mic-btn" id="micBtn" title="Spracheingabe starten">
      <!-- mic icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8"  y1="22" x2="16" y2="22"/>
      </svg>
    </button>
  </div>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="statusText">Bereit</span>
  </div>

  <div class="interim-box" id="interimBox">Zwischentext erscheint hier …</div>

  <div class="lang-row">
    <span>Sprache:</span>
    <select id="langSelect">
      <option value="de-DE">Deutsch</option>
      <option value="en-US">English (US)</option>
      <option value="en-GB">English (UK)</option>
      <option value="fr-FR">Français</option>
      <option value="es-ES">Español</option>
      <option value="it-IT">Italiano</option>
      <option value="nl-NL">Nederlands</option>
      <option value="pt-PT">Português</option>
    </select>
  </div>

  <div class="controls">
    <button class="btn" id="clearBtn">✕ Löschen</button>
    <button class="btn primary" id="copyBtn">Kopieren</button>
  </div>

  <div class="no-support" id="noSupport">
    ⚠ Dein Browser unterstützt die Web Speech API leider nicht.<br>
    Bitte nutze <strong>Chrome</strong> oder <strong>Edge</strong> für die Spracheingabe.
  </div>
</div>

<div class="footer">Web Speech API · Kein Server · Alles lokal</div>

<script>
  const micBtn     = document.getElementById('micBtn');
  const inputEl    = document.getElementById('sprachInput');
  const inputWrap  = document.getElementById('inputWrap');
  const dot        = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  const interimBox = document.getElementById('interimBox');
  const clearBtn   = document.getElementById('clearBtn');
  const copyBtn    = document.getElementById('copyBtn');
  const langSelect = document.getElementById('langSelect');
  const noSupport  = document.getElementById('noSupport');

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    micBtn.disabled = true;
    micBtn.style.opacity = '0.3';
    micBtn.style.cursor  = 'not-allowed';
    noSupport.style.display = 'block';
  } else {
    const recognition = new SpeechRecognition();
    let isListening = false;
    let finalTranscript = '';

    function applyLang() {
      recognition.lang = langSelect.value;
    }

    recognition.continuous    = true;
    recognition.interimResults = true;
    applyLang();
    langSelect.addEventListener('change', applyLang);

    function setStatus(state, msg) {
      dot.className = 'dot ' + state;
      statusText.textContent = msg;
    }

    recognition.onstart = () => {
      isListening = true;
      micBtn.classList.add('active');
      inputWrap.classList.add('listening');
      setStatus('on', 'Aufnahme läuft …');
      finalTranscript = inputEl.value;
    };

    recognition.onend = () => {
      isListening = false;
      micBtn.classList.remove('active');
      inputWrap.classList.remove('listening');
      interimBox.textContent = 'Zwischentext erscheint hier …';
      interimBox.classList.remove('has-text');
      setStatus('', 'Bereit');
    };

    recognition.onerror = (e) => {
      isListening = false;
      micBtn.classList.remove('active');
      inputWrap.classList.remove('listening');
      const msgs = {
        'not-allowed':  'Mikrofon-Zugriff verweigert',
        'no-speech':    'Keine Sprache erkannt',
        'network':      'Netzwerkfehler',
        'aborted':      'Abgebrochen',
      };
      setStatus('err', msgs[e.error] || 'Fehler: ' + e.error);
      interimBox.textContent = 'Zwischentext erscheint hier …';
      interimBox.classList.remove('has-text');
    };

    recognition.onresult = (e) => {
      let interim = '';
      let newFinal = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          newFinal += t;
        } else {
          interim += t;
        }
      }
      if (newFinal) {
        // Append with smart spacing
        const current = inputEl.value;
        if (current && !current.endsWith(' ')) {
          inputEl.value = current + ' ' + newFinal.trim();
        } else {
          inputEl.value = current + newFinal.trim();
        }
        finalTranscript = inputEl.value;
      }
      if (interim) {
        interimBox.textContent = interim;
        interimBox.classList.add('has-text');
      } else {
        interimBox.textContent = 'Zwischentext erscheint hier …';
        interimBox.classList.remove('has-text');
      }
    };

    micBtn.addEventListener('click', () => {
      if (isListening) {
        recognition.stop();
      } else {
        try {
          recognition.start();
        } catch(err) {
          setStatus('err', 'Konnte nicht starten: ' + err.message);
        }
      }
    });
  }

  // Clear
  clearBtn.addEventListener('click', () => {
    inputEl.value = '';
    interimBox.textContent = 'Zwischentext erscheint hier …';
    interimBox.classList.remove('has-text');
    setStatus('', 'Bereit');
    inputEl.focus();
  });

  // Copy
  copyBtn.addEventListener('click', async () => {
    if (!inputEl.value) return;
    try {
      await navigator.clipboard.writeText(inputEl.value);
      copyBtn.textContent = '✓ Kopiert!';
      setTimeout(() => copyBtn.textContent = 'Kopieren', 2000);
    } catch {
      inputEl.select();
      document.execCommand('copy');
    }
  });

  function setStatus(state, msg) {
    dot.className = 'dot ' + state;
    statusText.textContent = msg;
  }
</script>
</body>
</html>
