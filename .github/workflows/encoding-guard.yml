name: Encoding Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  mojibake-check:
    name: Mojibake-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run mojibake check
        shell: pwsh
        run: ./scripts/check-mojibake.ps1 -Root .
